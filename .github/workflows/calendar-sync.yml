name: Sync iCloud Calendar

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download calendar (no cache)
        run: |
          curl -L "https://p130-caldav.icloud.com/published/2/ODk5NjQ1MDk4OTk2NDUwOR-JP6zFGVk1H6zHu1TkiHoFVeqJwFbHYV-D8HQD0QWfV4XZqUiA0LNYA5bv4rM9i9CicWpQpX7TgqZjoa7CjZc?cachebust=$(date +%s)" -o calendar.ics

      - name: Commit file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add calendar.ics

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "update calendar"
          git push
