<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#000;
  margin:0;
  padding:18px;
  line-height:1.4;
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

/* WEATHER */
.weather{
  border:1px solid #000;
  padding:14px;
  margin-bottom:16px;
  font-size:22px;
  display:flex;
  align-items:center;
  gap:14px;
}

.weather-icon{
  font-size:32px;
  font-weight:bold;
  min-width:90px;
}

.weather-text{
  font-size:24px;
}

/* LAST UPDATED */
.updated{
  font-size:16px;
  margin-bottom:10px;
  color:#444;
}

/* CALENDAR */
.day{
  margin-top:18px;
}

.day-title{
  font-size:30px;
  font-weight:bold;
  border-bottom:1px solid #000;
  margin-bottom:8px;
}

/* EVENTS */
.event{
  font-size:24px;
  margin-left:10px;
  margin-bottom:6px;
}

.event-timed{
  margin-left:18px;
}

.event-allDay{
  font-weight:bold;
  margin-left:10px;
  padding:2px 0;
  color:#000;
  letter-spacing:0.5px;
}
</style>
</head>

<body>

<h1>Family Calendar</h1>

<div class="weather" id="weather">Loading weather...</div>

<div class="updated" id="updated">Last updated: loading...</div>

<div id="calendar">Loading events...</div>

<script>

// ================= CONFIG =================
var ICAL_URL = "./calendar.ics";

// Berkhamsted
var LAT = 51.76;
var LON = -0.56;

// ================= WEATHER ICONS =================
function getWeatherIcon(code){
  if (code === 0) return "SUN";
  if (code === 1 || code === 2 || code === 3) return "CLOUDY";
  if (code === 45 || code === 48) return "FOG";
  if (code === 51 || code === 53 || code === 55) return "DRIZZLE";
  if (code === 61 || code === 63 || code === 65) return "RAIN";
  if (code === 71 || code === 73 || code === 75) return "SNOW";
  if (code === 95 || code === 96 || code === 99) return "STORM";
  return "WEATHER";
}

// ================= DATE HELPERS =================
function getDate(offset){
  var d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10).replace(/-/g,"");
}

function formatTime(t){
  if (!t) return "";
  return t.substring(0,2) + ":" + t.substring(2);
}

// ================= ICS PARSER =================
function parseICS(text){
  var lines = text.split(/\r?\n/);

  var events = [];
  var ev = null;

  for (var i = 0; i < lines.length; i++){
    var line = lines[i];

    if (line.indexOf("BEGIN:VEVENT") === 0){
      ev = {};
      continue;
    }

    if (!ev) continue;

    if (line.indexOf("SUMMARY") === 0){
      ev.title = line.split(":")[1];
    }

    if (line.indexOf("DTSTART") === 0){
      var value = line.split(":")[1];
      if (value){
        ev.date = value.substring(0,8);
        ev.time = value.indexOf("T") > -1 ? value.substring(9,13) : null;
      }
    }

    if (line.indexOf("END:VEVENT") === 0){
      if (ev.title && ev.date){
        events.push(ev);
      }
      ev = null;
    }
  }

  return events;
}

// ================= WEATHER =================
function loadWeather(){
  var xhr = new XMLHttpRequest();

  xhr.open("GET",
    "https://api.open-meteo.com/v1/forecast?latitude=" + LAT +
    "&longitude=" + LON +
    "&current_weather=true&timezone=Europe/London",
    true
  );

  xhr.onreadystatechange = function(){
    if (xhr.readyState === 4 && xhr.status === 200){
      try {
        var data = JSON.parse(xhr.responseText);
        var w = data.current_weather || {};

        var code = (w.weathercode !== undefined && w.weathercode !== null) ? w.weathercode : 0;
        var icon = getWeatherIcon(code);

        var temp = (w.temperature !== undefined) ? w.temperature : "--";

        document.getElementById("weather").innerHTML =
          "<div class='weather-icon'>" + icon + "</div>" +
          "<div class='weather-text'>" +
          temp + "°C · Feels like " + temp + "°C" +
          "</div>";

      } catch (e) {
        document.getElementById("weather").innerHTML = "Weather unavailable";
      }
    }
  };

  xhr.send();
}

// ================= CALENDAR =================
function loadCalendar(){
  var xhr = new XMLHttpRequest();

  xhr.open("GET", ICAL_URL, true);

  xhr.onreadystatechange = function(){
    if (xhr.readyState === 4 && xhr.status === 200){

      var events = parseICS(xhr.responseText);

      var today = getDate(0);
      var tomorrow = getDate(1);
      var day3 = getDate(2);

      var groups = {
        "Today": [],
        "Tomorrow": [],
        "In 2 days": []
      };

      for (var i = 0; i < events.length; i++){
        var e = events[i];

        if (e.date === today) groups["Today"].push(e);
        else if (e.date === tomorrow) groups["Tomorrow"].push(e);
        else if (e.date === day3) groups["In 2 days"].push(e);
      }

      var html = "";

      for (var key in groups){
        html += "<div class='day'><div class='day-title'>" + key + "</div>";

        if (groups[key].length === 0){
          html += "<div class='event'>No events</div>";
        } else {

          for (var j = 0; j < groups[key].length; j++){
            var ev = groups[key][j];

            if (ev.time){
              html += "<div class='event event-timed'>⏰ " +
                formatTime(ev.time) + " " + ev.title +
              "</div>";
            } else {
              html += "<div class='event event-allDay'>ALL DAY " +
                ev.title +
              "</div>";
            }
          }
        }

        html += "</div>";
      }

      document.getElementById("calendar").innerHTML = html;

      document.getElementById("updated").innerHTML =
        "Last updated: " + new Date().toLocaleTimeString();
    }
  };

  xhr.send();
}

// ================= INIT =================
loadWeather();
loadCalendar();

setInterval(loadWeather, 10 * 60 * 1000);
setInterval(loadCalendar, 10 * 60 * 1000);

</script>

</body>
</html>
