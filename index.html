<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#000;
  margin:0;
  padding:18px;
  line-height:1.4;
}

h1{
  font-size:40px;
  margin-bottom:12px;
}

.weather{
  border:1px solid #000;
  padding:12px;
  margin-bottom:16px;
  font-size:26px;
}

.day-title{
  font-size:30px;
  font-weight:bold;
  border-bottom:1px solid #000;
  margin-top:18px;
  margin-bottom:8px;
}

.event{
  font-size:24px;
  margin-left:10px;
  margin-bottom:6px;
}
</style>
</head>

<body>

<h1>Family Calendar</h1>

<div class="weather" id="weather">Loading weather...</div>

<div class="day-title">Today</div>
<div id="events">Loading events...</div>

<script>

// ================= CONFIG =================
const ICAL_URL = "./calendar.ics";
const LAT = 51.76;
const LON = -0.45;

// ================= WEATHER =================
async function loadWeather(){
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&timezone=Europe/London`;
    const res = await fetch(url);
    const data = await res.json();

    const w = data.current_weather;

    document.getElementById("weather").innerHTML =
      "🌤 " + w.temperature + "°C · Wind " + w.windspeed + " km/h";

  } catch (err) {
    document.getElementById("weather").innerHTML =
      "Weather unavailable";
  }
}

// ================= ICS PARSER =================
function parseICS(text){
  const lines = text.split(/\r?\n/);
  const events = [];
  let ev = null;

  for (let line of lines){

    if (line.startsWith("BEGIN:VEVENT")){
      ev = {};
      continue;
    }

    if (!ev) continue;

    if (line.startsWith("SUMMARY:")){
      ev.title = line.replace("SUMMARY:", "").trim();
    }

    if (line.startsWith("DTSTART")){
      const value = line.split(":")[1]?.trim();
      if (value) {
        ev.date = value.slice(0,8); // works for DATE + DATETIME
      }
    }

    if (line.startsWith("END:VEVENT")){
      if (ev.title && ev.date){
        events.push(ev);
      }
      ev = null;
    }
  }

  return events;
}

// ================= CALENDAR =================
async function loadCalendar(){
  const container = document.getElementById("events");

  try {
    container.innerHTML = "Loading events...";

    const res = await fetch(ICAL_URL);

    if (!res.ok){
      throw new Error("HTTP " + res.status);
    }

    const text = await res.text();
    const events = parseICS(text);

    if (!events.length){
      container.innerHTML = "No events found";
      return;
    }

    container.innerHTML = events
      .map(e => `<div class="event">${e.title}</div>`)
      .join("");

  } catch (err) {
    container.innerHTML = "FAILED: " + err.message;
  }
}

// ================= INIT =================
loadWeather();
loadCalendar();

setInterval(loadWeather, 10 * 60 * 1000);
setInterval(loadCalendar, 10 * 60 * 1000);

</script>

</body>
</html>
