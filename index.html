<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#000;
  margin:0;
  padding:18px;
  line-height:1.4;
}

h1{
  font-size:40px;
  margin-bottom:10px;
}

/* WEATHER */
.weather{
  border:1px solid #000;
  padding:14px;
  margin-bottom:16px;
  font-size:22px;
  display:flex;
  align-items:center;
  gap:14px;
}

.weather-icon{
  font-size:42px;
  min-width:110px;
}

.weather-text{
  font-size:24px;
}

/* LAST UPDATED */
.updated{
  font-size:16px;
  margin-bottom:10px;
  color:#444;
}

/* DAYS */
.day{
  margin-top:18px;
}

.day-title{
  font-size:30px;
  font-weight:bold;
  border-bottom:1px solid #000;
  margin-bottom:8px;
}

/* EVENTS */
.event{
  font-size:24px;
  margin-left:10px;
  margin-bottom:6px;
}

.event-meta{
  font-weight:bold;
}

.event-title{
  font-weight:normal;
}

</style>
</head>

<body>

<h1>Family Calendar</h1>

<div class="weather" id="weather">Loading weather...</div>
<div class="updated" id="updated">Last updated: loading...</div>

<div id="calendar">Loading events...</div>

<script>

// ================= CONFIG =================
var ICAL_URL = "./calendar.ics";

// Berkhamsted
var LAT = 51.76;
var LON = -0.56;

// ================= WEATHER ICONS =================
function getWeatherIcon(code){
  if (code === 0) return "☀️";
  if (code <= 3) return "☁️";
  if (code <= 48) return "🌫️";
  if (code <= 55) return "🌦️";
  if (code <= 65) return "🌧️";
  if (code <= 75) return "❄️";
  if (code <= 99) return "⛈️";
  return "🌤️";
}

// ================= DATE HELPERS =================
function getDate(offset){
  var d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10).replace(/-/g,"");
}

function formatTime(t){
  if (!t) return "";
  return t.substring(0,2) + ":" + t.substring(2);
}

// ================= ICS PARSER (FIXED + SAFE) =================
function parseICS(text){
  var lines = text.split(/\r?\n/);

  var events = [];
  var ev = null;

  for (var i = 0; i < lines.length; i++){
    var line = lines[i];

    if (line.indexOf("BEGIN:VEVENT") === 0){
      ev = { rrule: null };
      continue;
    }

    if (!ev) continue;

    if (line.indexOf("SUMMARY") === 0){
      ev.title = line.split(":")[1];
    }

    if (line.indexOf("DTSTART") === 0){
      var value = line.split(":")[1];
      if (value){
        ev.date = value.substring(0,8);
        ev.time = value.indexOf("T") > -1 ? value.substring(9,13) : null;
      }
    }

    if (line.indexOf("RRULE") === 0){
      ev.rrule = line;
    }

    if (line.indexOf("END:VEVENT") === 0){
      if (ev.title && ev.date){
        events.push(ev);
      }
      ev = null;
    }
  }

  // ===== EXPAND EVENTS SAFELY (NO DUPLICATES) =====

  var today = getDate(0);
  var tomorrow = getDate(1);
  var day3 = getDate(2);

  function inWindow(date){
    return date === today || date === tomorrow || date === day3;
  }

  var finalEvents = [];

  for (var i = 0; i < events.length; i++){
    var e = events[i];

    // NORMAL EVENT
    if (!e.rrule){
      if (inWindow(e.date)){
        finalEvents.push(e);
      }
      continue;
    }

    // WEEKLY RECURRING EVENT (SAFE EXPANSION)
    if (e.rrule.indexOf("FREQ=WEEKLY") > -1){

      var base = new Date(
        e.date.substring(0,4),
        e.date.substring(4,6) - 1,
        e.date.substring(6,8)
      );

      for (var d = 0; d <= 14; d++){
        var test = new Date(base);
        test.setDate(test.getDate() + d);

        var iso =
          test.getFullYear().toString() +
          ("0" + (test.getMonth()+1)).slice(-2) +
          ("0" + test.getDate()).slice(-2);

        if (inWindow(iso)){
          finalEvents.push({
            title: e.title,
            date: iso,
            time: e.time
          });
        }
      }
    }
  }

  return finalEvents;
}

// ================= WEATHER =================
function loadWeather(){
  var xhr = new XMLHttpRequest();

  xhr.open("GET",
    "https://api.open-meteo.com/v1/forecast?latitude=" + LAT +
    "&longitude=" + LON +
    "&current_weather=true&timezone=Europe/London",
    true
  );

  xhr.onreadystatechange = function(){
    if (xhr.readyState === 4 && xhr.status === 200){
      var data = JSON.parse(xhr.responseText);
      var w = data.current_weather || {};

      document.getElementById("weather").innerHTML =
        "<div class='weather-icon'>" + getWeatherIcon(w.weathercode || 0) + "</div>" +
        "<div class='weather-text'>" +
        (w.temperature || "--") + "°C · Feels like " + (w.temperature || "--") + "°C" +
        "</div>";
    }
  };

  xhr.send();
}

// ================= CALENDAR =================
function loadCalendar(){
  var xhr = new XMLHttpRequest();

  xhr.open("GET", ICAL_URL, true);

  xhr.onreadystatechange = function(){
    if (xhr.readyState === 4 && xhr.status === 200){

      var events = parseICS(xhr.responseText);

      var today = getDate(0);
      var tomorrow = getDate(1);
      var day3 = getDate(2);

      var groups = {
        "Today": [],
        "Tomorrow": [],
        "In 2 days": []
      };

      for (var i = 0; i < events.length; i++){
        var e = events[i];

        if (e.date === today) groups["Today"].push(e);
        else if (e.date === tomorrow) groups["Tomorrow"].push(e);
        else if (e.date === day3) groups["In 2 days"].push(e);
      }

      var html = "";

      for (var key in groups){

        html += "<div class='day'><div class='day-title'>" + key + "</div>";

        if (groups[key].length === 0){
          html += "<div class='event'>No events</div>";
        } else {

          for (var j = 0; j < groups[key].length; j++){
            var ev = groups[key][j];

            if (ev.time){
              html += "<div class='event'>" +
                "<span class='event-meta'>⏰ " + formatTime(ev.time) + "</span> " +
                "<span class='event-title'>" + ev.title + "</span>" +
              "</div>";
            } else {
              html += "<div class='event'>" +
                "<span class='event-meta'>ALL DAY</span> " +
                "<span class='event-title'>" + ev.title + "</span>" +
              "</div>";
            }
          }
        }

        html += "</div>";
      }

      document.getElementById("calendar").innerHTML = html;

      document.getElementById("updated").innerHTML =
        "Last updated: " + new Date().toLocaleTimeString();
    }
  };

  xhr.send();
}

// ================= INIT =================
loadWeather();
loadCalendar();

setInterval(loadWeather, 10 * 60 * 1000);
setInterval(loadCalendar, 10 * 60 * 1000);

</script>

</body>
</html>
