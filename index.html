<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#000;
  margin:0;
  padding:18px;
  line-height:1.3;
}

.weather{
  border:1px solid #000;
  padding:12px;
  margin-bottom:16px;
  font-size:26px;
}

.updated{
  font-size:16px;
  margin-bottom:10px;
  color:#444;
}

.day-title{
  font-size:22px;
  font-weight:bold;
  border-bottom:1px solid #000;
  margin-top:16px;
}

.event{
  font-size:22px;
  margin-left:10px;
  margin-top:1px;
  margin-bottom:1px;
}

.event-meta{
  font-weight:bold;
}

.event-title{
  font-weight:normal;
}

</style>
</head>

<body>

<div class="weather" id="weather">Loading weather...</div>
<div class="updated" id="updated">Last updated: loading...</div>

<div id="calendar">Loading events...</div>

<script>

var ICAL_URL = "./calendar.ics";

var LAT = 51.76;
var LON = -0.56;

// ================= WEATHER TEXT =================
function getWeatherText(code){
  if (code === 0) return "SUNNY";
  if (code <= 3) return "CLOUDY";
  if (code <= 48) return "FOGGY";
  if (code <= 55) return "DRIZZLE";
  if (code <= 65) return "RAIN";
  if (code <= 75) return "SNOW";
  if (code <= 99) return "STORM";
  return "UNKNOWN";
}

// ================= DATE HELPERS =================
function getDate(offset){
  var d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10).replace(/-/g,"");
}

function getWeekdayIndex(offset){
  var d = new Date();
  d.setDate(d.getDate() + offset);
  return d.getDay(); // 0-6
}

function formatTime(t){
  if (!t) return "";
  return t.substring(0,2) + ":" + t.substring(2);
}

// ================= RRULE HELPERS (WEEKLY ONLY) =================
function weekdayToIndex(code){
  var map = {
    "SU":0,"MO":1,"TU":2,"WE":3,"TH":4,"FR":5,"SA":6
  };
  return map[code];
}

// ================= ICS PARSER =================
function parseICS(text){
  var lines = text.split(/\r?\n/);

  var events = [];
  var ev = null;

  for (var i = 0; i < lines.length; i++){
    var line = lines[i];

    if (line.indexOf("BEGIN:VEVENT") === 0){
      ev = {};
      continue;
    }

    if (!ev) continue;

    if (line.indexOf("SUMMARY") === 0){
      ev.title = line.split(":")[1];
    }

    if (line.indexOf("DTSTART") === 0){
      var value = line.split(":")[1];
      if (value){
        ev.date = value.substring(0,8);
        ev.time = value.indexOf("T") > -1 ? value.substring(9,13) : null;
      }
    }

    if (line.indexOf("RRULE") === 0){
      ev.rrule = line;
    }

    if (line.indexOf("END:VEVENT") === 0){
      if (ev.title){
        events.push(ev);
      }
      ev = null;
    }
  }

  // expand weekly recurring events (next 7 days only)
  var expanded = [];

  for (var i = 0; i < events.length; i++){
    var e = events[i];

    // normal event
    if (!e.rrule){
      if (e.date) expanded.push(e);
      continue;
    }

    // only handle weekly
    if (e.rrule.indexOf("FREQ=WEEKLY") !== -1){

      var bydayMatch = e.rrule.match(/BYDAY=([A-Z,]+)/);
      if (!bydayMatch) continue;

      var days = bydayMatch[1].split(",");

      for (var d = 0; d < 7; d++){
        var todayIndex = getWeekdayIndex(d);

        for (var x = 0; x < days.length; x++){
          if (weekdayToIndex(days[x]) === todayIndex){

            expanded.push({
              title: e.title,
              date: getDate(d),
              time: e.time
            });

          }
        }
      }
    }
  }

  return expanded;
}

// ================= WEATHER =================
function loadWeather(){
  var xhr = new XMLHttpRequest();

  xhr.open("GET",
    "https://api.open-meteo.com/v1/forecast?latitude=" + LAT +
    "&longitude=" + LON +
    "&current_weather=true&timezone=Europe/London",
    true
  );

  xhr.onreadystatechange = function(){
    if (xhr.readyState === 4 && xhr.status === 200){
      var data = JSON.parse(xhr.responseText);
      var w = data.current_weather || {};

      document.getElementById("weather").innerHTML =
        getWeatherText(w.weathercode || 0) +
        " · " + (w.temperature || "--") + "°C · Feels like " +
        (w.temperature || "--") + "°C";
    }
  };

  xhr.send();
}

// ================= CALENDAR =================
function loadCalendar(){
  var xhr = new XMLHttpRequest();

  xhr.open("GET", ICAL_URL, true);

  xhr.onreadystatechange = function(){
    if (xhr.readyState === 4 && xhr.status === 200){

      var events = parseICS(xhr.responseText);

      var html = "";

      for (var i = 0; i < 7; i++){

        var date = getDate(i);
        var label = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][getWeekdayIndex(i)];

        html += "<div class='day-title'>" + label + "</div>";

        var dayEvents = [];

        for (var j = 0; j < events.length; j++){
          if (events[j].date === date){
            dayEvents.push(events[j]);
          }
        }

        if (dayEvents.length === 0){
          html += "<div class='event'>No events</div>";
        } else {

          for (var k = 0; k < dayEvents.length; k++){
            var ev = dayEvents[k];

            if (ev.time){
              html += "<div class='event'>" +
                "<span class='event-meta'>⏰ " + formatTime(ev.time) + "</span> " +
                "<span class='event-title'>" + ev.title + "</span>" +
              "</div>";
            } else {
              html += "<div class='event'>" +
                "<span class='event-meta'>ALL DAY</span> " +
                "<span class='event-title'>" + ev.title + "</span>" +
              "</div>";
            }
          }
        }
      }

      document.getElementById("calendar").innerHTML = html;

      document.getElementById("updated").innerHTML =
        "Last updated: " + new Date().toLocaleTimeString();
    }
  };

  xhr.send();
}

// ================= INIT =================
loadWeather();
loadCalendar();

setInterval(loadWeather, 10 * 60 * 1000);
setInterval(loadCalendar, 10 * 60 * 1000);

</script>

</body>
</html>
