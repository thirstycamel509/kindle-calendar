<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Family Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#000;
  margin:0;
  padding:24px;
  line-height:1.5;
}

h1{
  margin:0 0 20px 0;
  font-size:48px;
  font-weight:bold;
}

.weather{
  border:2px solid #000;
  padding:16px;
  margin-bottom:24px;
  font-size:32px;
}

.day{
  margin-bottom:28px;
}

.day-title{
  font-size:36px;
  font-weight:bold;
  border-bottom:2px solid #000;
  margin-bottom:10px;
  padding-bottom:6px;
}

.event{
  font-size:30px;
  margin-left:12px;
  margin-bottom:6px;
}
</style>
</head>

<body>

<h1>Family Calendar</h1>

<div class="weather">
London · 18°C · Partly Cloudy
</div>

<div class="day">
  <div class="day-title">Today</div>
  <div class="event">09:00 School Run</div>
  <div class="event">18:00 Football Practice</div>
</div>

<div class="day">
  <div class="day-title">Tomorrow</div>
  <div class="event">08:30 Dentist</div>
</div>

<div class="day">
  <div class="day-title">Sunday</div>
  <div class="event">14:00 Birthday Party</div>
</div>

</body>
</html>
