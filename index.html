<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Calendar</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #000000;
  margin: 0;
  padding: 12px;
  width: 100%;
}

h1 {
  font-size: 28px;
  margin: 0 0 10px 0;
}

.weather {
  border: 1px solid #000;
  padding: 8px;
  margin-bottom: 12px;
  font-size: 18px;
}

.day {
  margin-bottom: 14px;
}

.day-title {
  font-size: 20px;
  font-weight: bold;
  border-bottom: 1px solid #000;
  margin-bottom: 4px;
  padding-bottom: 2px;
}

.event {
  font-size: 18px;
  padding-left: 6px;
}
</style>
</head>

<body>

<h1>Family Calendar</h1>

<div class="weather">
London · 18°C · Partly Cloudy
</div>

<div class="day">
  <div class="day-title">Today</div>
  <div class="event">09:00 School Run</div>
  <div class="event">18:00 Football</div>
</div>

<div class="day">
  <div class="day-title">Tomorrow</div>
  <div class="event">08:30 Dentist</div>
</div>

<div class="day">
  <div class="day-title">Sunday</div>
  <div class="event">14:00 Birthday Party</div>
</div>

</body>
</html>
