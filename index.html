<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#000;
  margin:0;
  padding:18px;
  line-height:1.3;
}

.weather{
  border:1px solid #000;
  padding:12px;
  margin-bottom:16px;
  font-size:26px;
}

.updated{
  font-size:16px;
  margin-bottom:10px;
  color:#444;
}

.day-title{
  font-size:22px;
  font-weight:bold;
  border-bottom:1px solid #000;
  margin-top:16px;
}

.event{
  font-size:22px;
  margin-left:10px;
  margin-top:1px;
  margin-bottom:1px;
}

.event-meta{
  font-weight:bold;
}

.event-title{
  font-weight:normal;
}

</style>
</head>

<body>

<div class="weather" id="weather">Loading weather...</div>
<div class="updated" id="updated">Last updated: loading...</div>

<div id="calendar">Loading events...</div>

<script>

var ICAL_URL = "./calendar.ics";

var LAT = 51.76;
var LON = -0.56;

// ================= WEATHER =================
function getWeatherText(code){
  if (code === 0) return "SUNNY";
  if (code <= 3) return "CLOUDY";
  if (code <= 48) return "FOGGY";
  if (code <= 55) return "DRIZZLE";
  if (code <= 65) return "RAIN";
  if (code <= 75) return "SNOW";
  if (code <= 99) return "STORM";
  return "UNKNOWN";
}

// ================= DATE HELPERS =================
function getDate(offset){
  var d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10).replace(/-/g,"");
}

function formatTime(t){
  if (!t) return "";
  return t.substring(0,2) + ":" + t.substring(2);
}

// weekday index
function weekdayIndex(dateStr){
  var y = parseInt(dateStr.substring(0,4));
  var m = parseInt(dateStr.substring(4,6)) - 1;
  var d = parseInt(dateStr.substring(6,8));
  return new Date(y,m,d).getDay();
}

// ================= ICS PARSER =================
function parseICS(text){
  var lines = text.split(/\r?\n/);

  var events = [];
  var ev = null;

  for (var i = 0; i < lines.length; i++){
    var line = lines[i];

    if (line.indexOf("BEGIN:VEVENT") === 0){
      ev = {};
      continue;
    }

    if (!ev) continue;

    if (line.indexOf("SUMMARY") === 0){
      ev.title = line.split(":")[1];
    }

    if (line.indexOf("DTSTART") === 0){
      var v = line.split(":")[1];
      if (v){
        ev.startDate = v.substring(0,8);
        ev.time = v.indexOf("T") > -1 ? v.substring(9,13) : null;
      }
    }

    if (line.indexOf("RRULE") === 0){
      ev.rrule = line;
    }

    if (line.indexOf("END:VEVENT") === 0){
      if (ev.title && ev.startDate){
        events.push(ev);
      }
      ev = null;
    }
  }

  return expandEvents(events);
}

// ================= RRULE EXPANSION =================
function expandEvents(events){

  var output = [];
  var seen = {};

  for (var i = 0; i < events.length; i++){
    var e = events[i];

    // NON recurring
    if (!e.rrule){
      addIfInRange(e);
      continue;
    }

    // WEEKLY only (your main case)
    if (e.rrule.indexOf("FREQ=WEEKLY") !== -1){

      var match = e.rrule.match(/BYDAY=([A-Z,]+)/);
      if (!match) continue;

      var days = match[1].split(",");

      for (var d = 0; d < 7; d++){

        var dateStr = getDate(d);
        var wd = weekdayIndex(dateStr);

        for (var x = 0; x < days.length; x++){

          var map = {SU:0,MO:1,TU:2,WE:3,TH:4,FR:5,SA:6};

          if (map[days[x]] === wd){

            var key = e.title + "|" + dateStr + "|" + (e.time || "");

            if (!seen[key]){
              seen[key] = true;

              output.push({
                title: e.title,
                date: dateStr,
                time: e.time
              });
            }
          }
        }
      }
    }

    // MONTHLY basic support (DOTTY rule)
    if (e.rrule.indexOf("FREQ=MONTHLY") !== -1){
      addIfInRange(e);
    }
  }

  function addIfInRange(e){
    for (var i = 0; i < 7; i++){
      var dateStr = getDate(i);

      if (e.startDate === dateStr){

        var key = e.title + "|" + dateStr + "|" + (e.time || "");

        if (!seen[key]){
          seen[key] = true;

          output.push({
            title: e.title,
            date: dateStr,
            time: e.time
          });
        }
      }
    }
  }

  return output;
}

// ================= WEATHER =================
function loadWeather(){
  var xhr = new XMLHttpRequest();

  xhr.open("GET",
    "https://api.open-meteo.com/v1/forecast?latitude=" + LAT +
    "&longitude=" + LON +
    "&current_weather=true&timezone=Europe/London",
    true
  );

  xhr.onreadystatechange = function(){
    if (xhr.readyState === 4 && xhr.status === 200){
      var data = JSON.parse(xhr.responseText);
      var w = data.current_weather || {};

      document.getElementById("weather").innerHTML =
        getWeatherText(w.weathercode || 0) +
        " · " + (w.temperature || "--") + "°C · Feels like " +
        (w.temperature || "--") + "°C";
    }
  };

  xhr.send();
}

// ================= CALENDAR =================
function loadCalendar(){
  var xhr = new XMLHttpRequest();

  xhr.open("GET", ICAL_URL, true);

  xhr.onreadystatechange = function(){
    if (xhr.readyState === 4 && xhr.status === 200){

      var events = parseICS(xhr.responseText);

      var html = "";

      var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

      for (var i = 0; i < 7; i++){

        var date = getDate(i);
        var wd = days[new Date().getDay()];

        html += "<div class='day-title'>" + days[new Date(new Date().setDate(new Date().getDate()+i)).getDay()] + "</div>";

        var dayEvents = [];

        for (var j = 0; j < events.length; j++){
          if (events[j].date === date){
            dayEvents.push(events[j]);
          }
        }

        if (dayEvents.length === 0){
          html += "<div class='event'>No events</div>";
        } else {

          for (var k = 0; k < dayEvents.length; k++){
            var ev = dayEvents[k];

            if (ev.time){
              html += "<div class='event'><span class='event-meta'>⏰ " +
                formatTime(ev.time) +
                "</span> <span class='event-title'>" + ev.title + "</span></div>";
            } else {
              html += "<div class='event'><span class='event-meta'>ALL DAY</span> " +
                "<span class='event-title'>" + ev.title + "</span></div>";
            }
          }
        }
      }

      document.getElementById("calendar").innerHTML = html;

      document.getElementById("updated").innerHTML =
        "Last updated: " + new Date().toLocaleTimeString();
    }
  };

  xhr.send();
}

// ================= INIT =================
loadWeather();
loadCalendar();

setInterval(loadWeather, 10 * 60 * 1000);
setInterval(loadCalendar, 10 * 60 * 1000);

</script>

</body>
</html>
