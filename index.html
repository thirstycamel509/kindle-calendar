<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#000;
  margin:0;
  padding:18px;
  line-height:1.4;
}

h1{
  font-size:40px;
  margin-bottom:12px;
}

.weather{
  border:1px solid #000;
  padding:12px;
  margin-bottom:16px;
  font-size:26px;
}

.day{
  margin-top:18px;
}

.day-title{
  font-size:30px;
  font-weight:bold;
  border-bottom:1px solid #000;
  margin-bottom:8px;
}

.event{
  font-size:24px;
  margin-left:10px;
  margin-bottom:6px;
}
</style>
</head>

<body>

<h1>Family Calendar</h1>

<div class="weather" id="weather">Loading weather...</div>

<div id="calendar">Loading events...</div>

<script>

const ICAL_URL = "./calendar.ics";
const LAT = 51.76;
const LON = -0.45;

// ---------------- WEATHER ----------------
async function loadWeather(){
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&timezone=Europe/London`;
    const res = await fetch(url);
    const data = await res.json();

    const w = data.current_weather;

    document.getElementById("weather").innerHTML =
      "🌤 " + w.temperature + "°C · Wind " + w.windspeed + " km/h";
  } catch (e) {
    document.getElementById("weather").innerHTML = "Weather unavailable";
  }
}

// ---------------- ICS PARSER ----------------
function parseICS(text){
  const lines = text.split(/\r?\n/);

  const events = [];
  let ev = null;

  for (let line of lines){

    if (line.startsWith("BEGIN:VEVENT")){
      ev = {};
      continue;
    }

    if (!ev) continue;

    if (line.startsWith("SUMMARY")){
      ev.title = line.split(":")[1]?.trim();
    }

    if (line.startsWith("DTSTART")){
      const value = line.split(":")[1]?.trim();
      if (value){
        ev.rawDate = value;
        ev.date = value.slice(0,8);
        ev.time = value.includes("T") ? value.slice(9,13) : null;
      }
    }

    if (line.startsWith("END:VEVENT")){
      if (ev.title && ev.date){
        events.push(ev);
      }
      ev = null;
    }
  }

  return events;
}

// ---------------- DATE HELPERS ----------------
function getDateOffset(offset){
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().slice(0,10).replace(/-/g,"");
}

function formatTime(t){
  if (!t) return "";
  return t.slice(0,2) + ":" + t.slice(2);
}

// ---------------- CALENDAR RENDER ----------------
async function loadCalendar(){
  const container = document.getElementById("calendar");

  try {
    const res = await fetch(ICAL_URL);
    const text = await res.text();

    const events = parseICS(text);

    const today = getDateOffset(0);
    const tomorrow = getDateOffset(1);
    const day3 = getDateOffset(2);

    const groups = {
      "Today": [],
      "Tomorrow": [],
      "In 2 days": []
    };

    for (let e of events){
      const label =
        e.date === today ? "Today" :
        e.date === tomorrow ? "Tomorrow" :
        e.date === day3 ? "In 2 days" :
        null;

      if (label){
        groups[label].push(e);
      }
    }

    let html = "";

    for (let label of Object.keys(groups)){
      html += `<div class="day"><div class="day-title">${label}</div>`;

      if (groups[label].length === 0){
        html += `<div class="event">No events</div>`;
      } else {
        for (let e of groups[label]){
          const time = e.time ? formatTime(e.time) + " " : "";
          html += `<div class="event">${time}${e.title}</div>`;
        }
      }

      html += `</div>`;
    }

    container.innerHTML = html;

  } catch (err) {
    container.innerHTML = "FAILED: " + err.message;
  }
}

// ---------------- INIT ----------------
loadWeather();
loadCalendar();

setInterval(loadWeather, 10 * 60 * 1000);
setInterval(loadCalendar, 10 * 60 * 1000);

</script>

</body>
</html>
