<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Family Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#000;
  margin:0;
  padding:20px;
  line-height:1.4;
}

h1{
  margin:0 0 15px 0;
  font-size:32px;
}

.weather{
  border:1px solid #000;
  padding:10px;
  margin-bottom:20px;
  font-size:22px;
}

.day{
  margin-bottom:18px;
}

.day-title{
  font-size:24px;
  font-weight:bold;
  border-bottom:1px solid #000;
  margin-bottom:6px;
  padding-bottom:4px;
}

.event{
  font-size:20px;
  margin-left:8px;
}
</style>
</head>

<body>

<h1>Family Calendar</h1>

<div class="weather">
London · 18°C · Partly Cloudy
</div>

<div class="day">
  <div class="day-title">Today</div>
  <div class="event">09:00 School Run</div>
  <div class="event">18:00 Football Practice</div>
</div>

<div class="day">
  <div class="day-title">Tomorrow</div>
  <div class="event">08:30 Dentist</div>
</div>

<div class="day">
  <div class="day-title">Sunday</div>
  <div class="event">14:00 Birthday Party</div>
</div>

</body>
</html>
