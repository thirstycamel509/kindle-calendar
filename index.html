<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Family Calendar</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#fff;
  color:#000;
  margin:0;
  padding:18px;
  line-height:1.4;
}

h1{
  font-size:40px;
  margin-bottom:12px;
}

.weather{
  border:1px solid #000;
  padding:12px;
  margin-bottom:16px;
  font-size:26px;
}

.day-title{
  font-size:30px;
  font-weight:bold;
  border-bottom:1px solid #000;
  margin-top:18px;
}

.event{
  font-size:24px;
  margin-left:10px;
}
</style>
</head>

<body>

<h1>Family Calendar</h1>

<div class="weather" id="weather">
Loading weather...
</div>

<div class="day-title">Today</div>
<div id="events">Loading events...</div>

<script>
const ICAL_URL = "https://p130-caldav.icloud.com/published/2/ODk5NjQ1MDk4OTk2NDUwOR-JP6zFGVk1H6zHu1TkiHoFVeqJwFbHYV-D8HQD0QWfV4XZqUiA0LNYA5bv4rM9i9CicWpQpX7TgqZjoa7CjZc";

const LAT = 51.76;
const LON = -0.45;

// ---------------- WEATHER ----------------
async function loadWeather(){
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current_weather=true&timezone=Europe/London`;
  const res = await fetch(url);
  const data = await res.json();

  const w = data.current_weather;

  document.getElementById("weather").innerHTML =
    "🌤 " + w.temperature + "°C · Wind " + w.windspeed + " km/h";
}

// ---------------- ICS PARSER ----------------
function parseICS(text){
  const lines = text.split(/\r?\n/);
  const events = [];
  let ev = null;

  for (let line of lines){
    if(line === "BEGIN:VEVENT") ev = {};

    if(!ev) continue;

    if(line.startsWith("SUMMARY")){
      ev.title = line.split(":")[1];
    }

    if(line.startsWith("DTSTART")){
      ev.date = line.split(":")[1].slice(0,8);
    }

    if(line === "END:VEVENT"){
      if(ev.title && ev.date) events.push(ev);
      ev = null;
    }
  }

  return events;
}

// ---------------- CALENDAR ----------------
async function loadCalendar(){
  const res = await fetch(ICAL_URL);
  const text = await res.text();

  const events = parseICS(text);

  const today = new Date().toISOString().slice(0,10).replace(/-/g,"");

  const todayEvents = events.filter(e => e.date === today);

  const container = document.getElementById("events");

  if(todayEvents.length === 0){
    container.innerHTML = "<div class='event'>No events today</div>";
    return;
  }

  container.innerHTML = todayEvents
    .map(e => `<div class='event'>${e.title}</div>`)
    .join("");
}

// ---------------- INIT ----------------
loadWeather();
loadCalendar();
setInterval(loadWeather, 10 * 60 * 1000);
setInterval(loadCalendar, 10 * 60 * 1000);
</script>

</body>
</html>
